name: Publish CMS Common to GitHub Packages

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and Publish with Maven
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            mvn -B -T 1C clean deploy -ntp
          else
            mvn -B -T 1C clean install -ntp
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
